<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Studio Ultimate - Laiche Brahim</title>
    <style>
        :root {
            --bg-color: #1e1e26;
            --accent-color: #4a90e2;
            --success-color: #28a745;
            --text-color: #e0e0e0;
            --card-bg: #252530;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 15px;
            box-sizing: border-box;
        }

        h2 { text-align: center; font-weight: 300; color: var(--accent-color); margin-bottom: 20px; }
        .container { flex: 1; max-width: 650px; margin: 0 auto; width: 100%; }
        .section { background: var(--card-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 100%; box-sizing: border-box; }
        label { font-size: 0.75em; color: #888; display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input[type="text"], input[type="color"], textarea { width: 100%; background: #121218; border: 1px solid #333; border-radius: 8px; color: #00ffc8; padding: 12px; box-sizing: border-box; font-size: 14px; }
        input[type="color"] { height: 50px; padding: 5px; cursor: pointer; }
        textarea { height: 130px; font-family: 'Courier New', monospace; resize: vertical; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; background: var(--accent-color); color: white; font-weight: bold; cursor: pointer; transition: all 0.2s; margin-top: 5px; }
        #btnImage.ready { background: var(--success-color); }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .copy-btn { background: #444; font-size: 0.7em; padding: 5px 10px; width: auto; border-radius: 4px; }
        .results-area { display: none; }
        #htmlCopyBtn { display: none; }
        footer { text-align: center; font-size: 0.75em; color: #555; padding: 30px 0; margin-top: auto; }
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>PWA Studio V4.1</h2>

    <div class="section">
        <label>Titre de l'application</label>
        <input type="text" id="appTitle" placeholder="Ex: My App" style="margin-bottom:15px">

        <div style="display: flex; gap: 15px; margin-bottom: 15px;">
            <div style="flex: 1;">
                <label>Couleur Thème</label>
                <input type="color" id="themeColor" value="#1e1e26">
            </div>
            <div style="flex: 2;">
                <label>Icône (PNG)</label>
                <input type="file" id="fileInput" accept="image/*">
                <button id="btnImage" style="height: 50px; margin-top:0;">UPLOAD IMAGE</button>
            </div>
        </div>

        <div class="header-row">
            <label>Code HTML Source</label>
            <button id="htmlCopyBtn" class="copy-btn" onclick="copyToClipboard('htmlInput')">Copier HTML Injecté</button>
        </div>
        <textarea id="htmlInput" placeholder="Collez votre code HTML complet ici..."></textarea>

        <button onclick="generateFiles()" style="background: #6200ee; margin-top: 15px;">GÉNÉRER LE PACK PWA</button>
    </div>

    <div id="results" class="results-area">
        <div class="section">
            <div class="header-row"><label>manifest.json</label><button class="copy-btn" onclick="copyToClipboard('manifestOutput')">Copier</button></div>
            <textarea id="manifestOutput" readonly></textarea>
        </div>
        <div class="section">
            <div class="header-row"><label>sw.js</label><button class="copy-btn" onclick="copyToClipboard('swOutput')">Copier</button></div>
            <textarea id="swOutput" readonly></textarea>
        </div>
    </div>
</div>

<canvas id="canvas512" width="512" height="512" style="display:none;"></canvas>
<footer>Made by Laiche Brahim 2026 Paris</footer>

<script>
    let processedImageData = null;

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.getElementById('canvas512');
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, 512, 512);
                ctx.drawImage(img, 0, 0, 512, 512);
                processedImageData = canvas.toDataURL("image/png");
                const btn = document.getElementById('btnImage');
                btn.innerText = "TÉLÉCHARGER icon.png";
                btn.classList.add('ready');
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    document.getElementById('btnImage').onclick = function() {
        if (this.classList.contains('ready')) {
            const link = document.createElement('a');
            link.download = 'icon.png';
            link.href = processedImageData;
            link.click();
        } else {
            document.getElementById('fileInput').click();
        }
    };

    function generateFiles() {
        const title = document.getElementById('appTitle').value || "App";
        const themeColor = document.getElementById('themeColor').value;
        const htmlField = document.getElementById('htmlInput');
        let html = htmlField.value;

        if(!html.includes('<head')) {
            alert("Erreur : Collez un code HTML complet (incluant <head> et <body>)");
            return;
        }

        // 1. Préparation des balises HEAD
        const headTags = `
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="${themeColor}">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">`;

        // 2. Préparation du script BODY
        const bodyTags = `
    <style>
        #pwaInstallBtn {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: ${themeColor}; color: white; border: none; padding: 12px 24px;
            border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: none; z-index: 10000; font-weight: bold; cursor: pointer;
        }
    </style>
    <button id="pwaInstallBtn">Installer l'application</button>
    <script>
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('pwaInstallBtn').style.display = 'block';
        });
        document.getElementById('pwaInstallBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                document.getElementById('pwaInstallBtn').style.display = 'none';
            }
        });
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW error:', err));
            });
        }
    <\/script>`;

        // Nettoyage et Insertion propre
        html = html.replace('</head>', headTags + '\n</head>');
        html = html.replace('</body>', bodyTags + '\n</body>');

        htmlField.value = html;
        document.getElementById('htmlCopyBtn').style.display = 'block';
        document.getElementById('results').style.display = 'block';

        // Manifest
        document.getElementById('manifestOutput').value = JSON.stringify({
            "short_name": title,
            "name": title,
            "icons": [{"src": "icon.png", "sizes": "512x512", "type": "image/png", "purpose": "any maskable"}],
            "start_url": "./index.html",
            "display": "standalone",
            "theme_color": themeColor,
            "background_color": themeColor
        }, null, 4);

        // Service Worker
        document.getElementById('swOutput').value = `const CACHE = 'v1';
const assets = ['./', './index.html', './manifest.json', './icon.png'];
self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(assets))));
self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));`;
    }

    function copyToClipboard(id) {
        const copyText = document.getElementById(id);
        copyText.select();
        navigator.clipboard.writeText(copyText.value);
        const btn = event.currentTarget;
        const oldText = btn.innerText;
        btn.innerText = "Copié !";
        btn.style.background = "#28a745";
        setTimeout(() => { btn.innerText = oldText; btn.style.background = "#444"; }, 1500);
    }
</script>
</body>
</html>
